<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TFT Item Forge — จำไอเท็ม TFT</title>
    <meta name="description" content="เกมทดสอบความจำไอเท็ม TFT — ลากไอเท็มเพื่อตอบคำถามว่าตีอะไรได้อะไร">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Orbitron:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="bg-grid"></div>
    <div class="bg-glow bg-glow-1"></div>
    <div class="bg-glow bg-glow-2"></div>
    <div class="bg-glow bg-glow-3"></div>
    <canvas id="particles"></canvas>
    <div id="confetti-container"></div>
    <div id="screen-flash" class="screen-flash"></div>

    <div id="achievement-toast" class="achievement-toast">
        <div class="ach-icon-wrap"><span class="ach-icon"></span></div>
        <div class="ach-info">
            <span class="ach-label">🏅 Achievement Unlocked!</span>
            <span class="ach-name"></span>
            <span class="ach-desc"></span>
        </div>
    </div>

    <div id="start-screen" class="screen active">
        <div class="logo-container">
            <div class="logo-hex"><span class="logo-icon">⚔️</span></div>
            <h1 class="logo-title">TFT ITEM FORGE</h1>
            <p class="logo-subtitle">ทดสอบความจำไอเท็ม — ตีอะไรได้อะไร?</p>
        </div>

        <div class="mode-selector">
            <button class="mode-btn" id="btn-quiz" onclick="startGame('quiz')">
                <div class="mode-icon">🎯</div>
                <div class="mode-info">
                    <span class="mode-name">Quiz Mode</span>
                    <span class="mode-desc">ลากไอเท็มเพื่อตอบ 15 คำถาม</span>
                </div>
                <div class="mode-arrow">→</div>
            </button>
            <button class="mode-btn" id="btn-endless" onclick="startGame('endless')">
                <div class="mode-icon">♾️</div>
                <div class="mode-info">
                    <span class="mode-name">Endless Mode</span>
                    <span class="mode-desc">เล่นไปเรื่อยๆ จนหมดหัวใจ</span>
                </div>
                <div class="mode-arrow">→</div>
            </button>
            <button class="mode-btn" id="btn-cheatsheet" onclick="showCheatSheet()">
                <div class="mode-icon">📖</div>
                <div class="mode-info">
                    <span class="mode-name">Cheat Sheet</span>
                    <span class="mode-desc">ดูตารางรวมไอเท็มทั้งหมด</span>
                </div>
                <div class="mode-arrow">→</div>
            </button>
        </div>

        <div class="high-score-display">
            <span class="hs-label">🏆 HIGH SCORE</span>
            <span class="hs-value" id="high-score-value">0</span>
        </div>
    </div>

    <div id="game-screen" class="screen">
        <div class="game-top-bar">
            <div class="stat-box">
                <span class="stat-label">SCORE</span>
                <span class="stat-value" id="score-display">0</span>
            </div>
            
            <div class="stat-box rank-box">
                <span class="stat-label">RANK</span>
                <div class="rank-display-mini">
                    <img id="rank-icon-mini" src="https://raw.githubusercontent.com/CommunityDragon/Canis/master/tier-icons/iron.png" alt="Rank Icon" width="24">
                    <span class="stat-value" id="rank-name-display">IRON</span>
                </div>
            </div>

            <div class="timer-container">
                <svg class="timer-ring" viewBox="0 0 100 100">
                    <circle class="timer-bg" cx="50" cy="50" r="45" />
                    <circle class="timer-progress" cx="50" cy="50" r="45" id="timer-circle" />
                </svg>
                <span class="timer-text" id="timer-text">10</span>
            </div>
            
            <div class="stat-box">
                <span class="stat-label">STREAK</span>
                <span class="stat-value streak-value" id="streak-display">0 🔥</span>
            </div>
        </div>

        <div class="progress-bar-container">
            <div class="progress-bar" id="progress-bar"></div>
            <span class="progress-text" id="progress-text">1 / 15</span>
        </div>

        <div class="question-area">
            <div class="question-label">ไอเท็มพื้นฐาน 2 ชิ้นนี้รวมกันได้อะไร?</div>
            <div class="recipe-display">
                <div class="recipe-item" id="recipe-item-1">
                    <div class="item-card base-card">
                        <img class="item-img" id="q-img-1" src="" alt="" />
                        <span class="item-name" id="q-name-1"></span>
                    </div>
                </div>
                <div class="recipe-plus">+</div>
                <div class="recipe-item" id="recipe-item-2">
                    <div class="item-card base-card">
                        <img class="item-img" id="q-img-2" src="" alt="" />
                        <span class="item-name" id="q-name-2"></span>
                    </div>
                </div>
                <div class="recipe-equals">=</div>
                <div class="drop-zone" id="drop-zone">
                    <div class="drop-zone-inner">
                        <span class="drop-icon">?</span>
                        <span class="drop-text">ลากมาวาง</span>
                    </div>
                </div>
            </div>
        </div>

        <div class="choices-grid" id="choices-grid"></div>

        <div class="powerups-bar">
            <button class="pu-btn" id="pu-5050" onclick="useFiftyFifty()"><span class="pu-icon">✂️</span> <span class="pu-count" id="pu-5050-count">1</span></button>
            <button class="pu-btn" id="pu-time" onclick="useExtraTime()"><span class="pu-icon">⏰</span> <span class="pu-count" id="pu-time-count">1</span></button>
            <button class="pu-btn" id="pu-skip" onclick="useSkip()"><span class="pu-icon">⏭️</span> <span class="pu-count" id="pu-skip-count">1</span></button>
        </div>
    </div>

    <div id="result-screen" class="screen">
        <div class="result-container">
            <div class="result-badge" id="result-badge">🏆</div>
            <h2 class="result-title" id="result-title">จบเกม!</h2>
            
            <div class="result-rank-container">
                <div class="rank-card">
                    <img id="result-rank-icon" src="https://raw.githubusercontent.com/CommunityDragon/Canis/master/tier-icons/iron.png" alt="Final Rank">
                    <div class="rank-info">
                        <span class="rank-label">YOUR FINAL RANK</span>
                        <span class="rank-tier" id="result-rank-name">IRON</span>
                    </div>
                </div>
            </div>

            <div class="result-stats">
                <div class="result-stat"><span class="rs-value" id="final-score">0</span><span class="rs-label">คะแนน</span></div>
                <div class="result-stat"><span class="rs-value" id="final-correct">0</span><span class="rs-label">ตอบถูก</span></div>
                <div class="result-stat"><span class="rs-value" id="final-streak">0</span><span class="rs-label">Best Streak</span></div>
            </div>

            <div class="result-buttons">
                <button class="btn-primary" onclick="startGame(lastMode)">🔄 เล่นอีกครั้ง</button>
                <button class="btn-secondary" onclick="goHome()">🏠 หน้าหลัก</button>
            </div>
        </div>
    </div>

    <script src="game.js"></script>
</body>
</html>
